<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Break Fast</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<!-- Loading screen -->
	<div id="loading-screen" class="loading-screen">
		<div class="loading-text">Loading...</div>
		<div class="loading-bar">
			<div id="loading-progress" class="loading-progress"></div>
		</div>
	</div>

	<div id="crossair" class="crossair invisible"></div>

	<!-- Main menu -->
	<div id="main-menu" class="main-menu">
		<div class="menu-content">
			<h1 class="menu-title"><span class="first-word">Break</span> Fast</h1>
			<button id="start-button" class="game-button">Start Game</button>
		</div>
	</div>

	<!-- Dialog box -->
	<div id="dialog-box" class="dialog-box invisible">
		<div class="dialog-speaker" id="dialog-speaker"></div>
		<div class="dialog-content" id="dialog-content"></div>
	</div>

	<!-- Menu that shows an item -->
	<div id="get-item-menu" class="get-item-menu vignette invisible">
		<div class="item-container">
			<h2 class="title">Cool item</h2>

			<div class="item">
				<div id="ring" class="ring"></div>
				<img id="item-image" class="item-image" src="" alt="">
			</div>

			<p class="description">This is a very cool item that you'll definetly want</p>
		</div>
	</div>

	<!-- Mobile action buttons -->
	<div id="action-buttons" class="action-buttons">
		<button id="btn-jump" class="action-btn">&#8593;</button>
		<button id="btn-interact" class="action-btn"><span class="action-btn-dot"></span></button>
	</div>

	<!-- Mobile joysticks -->
	<div id="joystick-left" class="joystick-container joystick-left">
		<div class="joystick-base">
			<div id="joystick-left-knob" class="joystick-knob"></div>
		</div>
	</div>
	<div id="joystick-right" class="joystick-container joystick-right">
		<div class="joystick-base">
			<div id="joystick-right-knob" class="joystick-knob"></div>
		</div>
	</div>

	<!-- End menu -->
	<div id="end-menu" class="end-menu invisible vignette">
		<h1 id="end-menu-title" class="menu-title invisible"><span class="first-word">You</span> got a break!</h1>

		<h2 id="end-menu-subtitle" class="menu-subtitle invisible">Items collected:</h2>

		<div id="end-menu-items">

		</div>

		<button id="end-button" class="game-button invisible">Main menu</button>
	</div>

	<script type="importmap">
		{
    		"imports": {
	     		"three": "https://threejs.org/build/three.module.js",
	     		"three/addons/": "https://threejs.org/examples/jsm/",
	     		"three/examples/jsm/loaders/GLTFLoader.js": "https://threejs.org/examples/jsm/loaders/GLTFLoader.js",
				"three/examples/jsm/utils/SkeletonUtils.js": "https://threejs.org/examples/jsm/utils/SkeletonUtils.js",
	     		"lil-gui": "https://unpkg.com/lil-gui@0.20.0/dist/lil-gui.esm.js",
				"cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
				"cannon-es-debugger": "https://cdn.jsdelivr.net/npm/cannon-es-debugger@1.0.0/dist/cannon-es-debugger.js"
    		}
  		}
	</script>

    <script type="module" src="index.js"></script>
</body>
</html>
