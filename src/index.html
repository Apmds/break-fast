<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Break Fast</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="loading-screen" class="loading-screen">
		<div class="loading-text">Loading...</div>
		<div class="loading-bar">
			<div id="loading-progress" class="loading-progress"></div>
		</div>
	</div>

	<div id="crossair" class="crossair invisible"></div>

	<div id="main-menu" class="main-menu">
		<div class="menu-content">
			<h1 class="menu-title"><span class="first-word">Break</span> Fast</h1>
			<button id="start-button" class="start-button">Start Game</button>
		</div>
	</div>

	<div id="dialog-box" class="dialog-box invisible">
		<div class="dialog-speaker" id="dialog-speaker"></div>
		<div class="dialog-content" id="dialog-content"></div>
	</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
	<script type="importmap">
		{
    		"imports": {
	     		 "three": "https://threejs.org/build/three.module.js",
	     		 "three/addons/": "https://threejs.org/examples/jsm/",
	     		 "three/examples/jsm/loaders/GLTFLoader.js": "https://threejs.org/examples/jsm/loaders/GLTFLoader.js",
				 "three/examples/jsm/utils/SkeletonUtils.js": "https://threejs.org/examples/jsm/utils/SkeletonUtils.js",
	     		 "lil-gui": "https://unpkg.com/lil-gui@0.20.0/dist/lil-gui.esm.js",
				 "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    		}
  		}
	</script>

    <script type="module" src="index.js"></script>
</body>
</html>
