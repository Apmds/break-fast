<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>ICG project</title>

    <style>
		body {
			background-color: #ffffff;
			margin: 0px;
			overflow: hidden;
		}

		.crossair {
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background-color: #ffffff;
			position: absolute;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
		}

		.dialog-box {
			width: 40%;
			height: 20%;
			
			border-radius: 25px;
			background-color: #ffffff;

			position: absolute;
			left:30%;
			top: 65%;
		}

		.invisible {
			display: none;
		}
	</style>
</head>
<body>
	<div class="crossair"></div>

	<div id="dialog-box" class="dialog-box invisible"></div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
	<script type="importmap">
		{
    		"imports": {
	     		 "three": "https://threejs.org/build/three.module.js",
	     		 "three/addons/": "https://threejs.org/examples/jsm/",
	     		 "three/examples/jsm/loaders/GLTFLoader.js": "https://threejs.org/examples/jsm/loaders/GLTFLoader.js",
	     		 "lil-gui": "https://unpkg.com/lil-gui@0.20.0/dist/lil-gui.esm.js",
				 "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    		}
  		}
	</script>

    <script type="module" src="index.js"></script>
</body>
</html>
